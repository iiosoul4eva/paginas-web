er-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;flex-shrink:0}.pos-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px}.stack-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0.75rem}.stack-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:0.9rem;transition:border-color 0.3s}.stack-card:hover{border-color:rgba(255,255,255,0.08)}.stack-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.6rem;text-align:center}.bc-row{display:flex;gap:5px;margin-bottom:0.6rem}.bc-box{flex:1;border-radius:8px;padding:0.5rem 0.4rem;text-align:center}.bc-box.bet{background:rgba(231,76,90,0.08);border:1px solid rgba(231,76,90,0.12)}.bc-box.check{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.1)}.bc-label{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:2px}.bc-box.bet .bc-label{color:var(--red)}.bc-box.check .bc-label{color:var(--check-green)}.bc-value{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1}.bc-box.bet .bc-value{color:var(--red)}.bc-box.check .bc-value{color:var(--check-green)}.mini-combined{height:16px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:0.6rem;background:rgba(255,255,255,0.03)}.mc-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:0.5rem;font-weight:600;color:white;min-width:0;overflow:hidden}.mc-seg span{white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.6)}.sizing-header{font-family:'JetBrains Mono',monospace;font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.4rem;text-align:center}.sizing-list{display:flex;flex-direction:column;gap:3px}.sz-item{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:5px;
