<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>C-Bet Comparativas</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#08090d;--bg-card:#12141c;--border:rgba(255,255,255,0.05);--green:#00e6a0;--red:#e74c5a;--text:#eaf0f6;--text-sec:#7a8494;--text-muted:#464e5c;--check-green:#4ade80}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.5}body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,230,160,0.02) 0%,transparent 60%);pointer-events:none}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}.header{text-align:center;padding:2rem 1.5rem 1rem;position:sticky;top:0;z-index:100;background:rgba(8,9,13,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,4vw,2.5rem);letter-spacing:3px;line-height:1}.header h1 .g{color:var(--green)}.header p{color:var(--text-sec);font-size:0.85rem;margin-top:0.3rem}.quick-nav{display:flex;justify-content:center;gap:6px;margin-top:0.6rem;flex-wrap:wrap}.qn-btn{padding:4px 14px;border-radius:6px;font-size:0.7rem;font-weight:600;background:var(--bg-card);border:1px solid var(--border);color:var(--text-sec);text-decoration:none;transition:all 0.2s;font-family:'Outfit',sans-serif}.qn-btn:hover{color:var(--text)}.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}.section{margin-bottom:3rem;scroll-margin-top:100px}.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:1rem;text-align:center}.compare-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;font-size:0.8rem;margin-bottom:1rem}.compare-table th{background:rgba(255,255,255,0.02);padding:10px 12px;font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);text-align:center;border-bottom:1px solid var(--border)}.compare-table td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace}.compare-table tr:last-child td{border-bottom:none}.compare-table tr:hover td{background:rgba(255,255,255,0.015)}.pos-td{font-weight:700;font-family:'Outfit',sans-serif;text-align:left!important;padding-left:16px!important}.bet-td{color:var(--red);font-weight:600}.chk-td{color:var(--check-green);font-weight:600}.diff-pos{color:var(--green);font-size:0.65rem;font-weight:700}.diff-neg{color:var(--red);font-size:0.65rem;font-weight:700}.ins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:1.5rem}.ins-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:1rem}.ins-card h4{font-size:0.85rem;margin-bottom:0.4rem;display:flex;align-items:center;gap:6px}.ins-card p{font-size:0.78rem;color:var(--text-sec);line-height:1.5}.hl{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green)}.hl-r{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red)}.footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.7rem;border-top:1px solid var(--border)}@media(max-width:768px){.ins-grid{grid-template-columns:1fr}}</style></head><body>
<header class="header"><h1>C-BET IP — <span class="g">COMPARATIVAS</span></h1><p>Todas las comparaciones: vs BB vs SB · General vs A-high · Por posición y stack</p><nav class="quick-nav"><a href="#bb-vs-sb" class="qn-btn">BB vs SB General</a><a href="#ahigh-bb-sb" class="qn-btn">A-high: BB vs SB</a><a href="#gen-vs-ahigh" class="qn-btn">General vs A-high</a><a href="#mega" class="qn-btn" style="color:var(--green)">Mega Tabla</a></nav></header>
<div class="container" id="main"></div><div class="footer">Poker Study · C-Bet IP Comparativas</div>
<script>
const data={
  genBB:{EP:[89.9,89.9,85.4],MP:[82.3,86.5,83.9],CO:[75.3,81.8,79.6],BTN:[69.7,76.9,75.2]},
  genSB:{EP:[78.7,77.9,75],MP:[64.7,69.9,68],CO:[56.6,60.1,57.3],BTN:[51.1,53,50.5]},
  ahBB:{EP:[98.3,96.1,93.6],MP:[91.1,92.6,86.1],CO:[95.8,95.9,94.1],BTN:[95.9,99.6,99.5]},
  ahSB:{EP:[87.1,80.4,69.6],MP:[67.3,73,66.3],CO:[67.5,53.8,66.3],BTN:[54.5,48.1,42]}
};
const pos=["EP","MP","CO","BTN"];
const colors={EP:"#e74c5a",MP:"#f97316",CO:"#eab308",BTN:"#4da6ff"};
const stacks=["20BB","30BB","40BB"];

function diff(a,b){const d=(a-b).toFixed(1);return `<span class="${parseFloat(d)>=0?'diff-pos':'diff-neg'}">(${parseFloat(d)>=0?'+':''}${d})</span>`}
function row(p,a,b){return stacks.map((s,i)=>`<td class="bet-td">${a[i]}%</td><td style="color:var(--text-muted)">${b[i]}% ${diff(a[i],b[i])}</td>`).join('')}

const m=document.getElementById('main');
let h='';

// 1. BB vs SB General
h+=`<section class="section" id="bb-vs-sb"><div class="section-title">📊 C-BET GENERAL: vs BB vs vs SB</div><table class="compare-table"><thead><tr><th>Posición</th><th colspan="2">20 BB</th><th colspan="2">30 BB</th><th colspan="2">40 BB</th></tr><tr><th></th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th></tr></thead><tbody>`;
pos.forEach(p=>{h+=`<tr><td class="pos-td" style="color:${colors[p]}">${p}</td>`;stacks.forEach((s,i)=>{h+=`<td class="bet-td">${data.genBB[p][i]}%</td><td style="color:#a855f7">${data.genSB[p][i]}% ${diff(data.genSB[p][i],data.genBB[p][i])}</td>`;});h+=`</tr>`;});
h+=`</tbody></table></section>`;

// 2. A-high: BB vs SB
h+=`<section class="section" id="ahigh-bb-sb"><div class="section-title">📊 A-HIGH BOARD: vs BB vs vs SB</div><table class="compare-table"><thead><tr><th>Posición</th><th colspan="2">20 BB</th><th colspan="2">30 BB</th><th colspan="2">40 BB</th></tr><tr><th></th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th><th style="color:var(--green)">vs BB</th><th style="color:#a855f7">vs SB</th></tr></thead><tbody>`;
pos.forEach(p=>{h+=`<tr><td class="pos-td" style="color:${colors[p]}">${p}</td>`;stacks.forEach((s,i)=>{h+=`<td class="bet-td">${data.ahBB[p][i]}%</td><td style="color:#a855f7">${data.ahSB[p][i]}% ${diff(data.ahSB[p][i],data.ahBB[p][i])}</td>`;});h+=`</tr>`;});
h+=`</tbody></table></section>`;

// 3. General vs A-high
h+=`<section class="section" id="gen-vs-ahigh"><div class="section-title">📊 GENERAL vs A-HIGH BOARD (Bet %)</div><table class="compare-table"><thead><tr><th>Spot</th><th>Posición</th><th>20BB Gen</th><th>20BB A-h</th><th>30BB Gen</th><th>30BB A-h</th><th>40BB Gen</th><th>40BB A-h</th></tr></thead><tbody>`;
pos.forEach(p=>{
h+=`<tr><td style="color:var(--green)">vs BB</td><td class="pos-td" style="color:${colors[p]}">${p}</td>`;stacks.forEach((s,i)=>{h+=`<td style="color:var(--text-muted)">${data.genBB[p][i]}%</td><td class="bet-td">${data.ahBB[p][i]}% ${diff(data.ahBB[p][i],data.genBB[p][i])}</td>`;});h+=`</tr>`;
h+=`<tr><td style="color:#a855f7">vs SB</td><td class="pos-td" style="color:${colors[p]}">${p}</td>`;stacks.forEach((s,i)=>{h+=`<td style="color:var(--text-muted)">${data.genSB[p][i]}%</td><td class="bet-td">${data.ahSB[p][i]}% ${diff(data.ahSB[p][i],data.genSB[p][i])}</td>`;});h+=`</tr>`;
});
h+=`</tbody></table></section>`;

// 4. Mega table
h+=`<section class="section" id="mega"><div class="section-title">🏆 MEGA TABLA — TODOS LOS DATOS</div><table class="compare-table"><thead><tr><th>Posición</th><th>Stack</th><th style="color:var(--green)">Gen vsBB</th><th style="color:#f97316">Ah vsBB</th><th style="color:#a855f7">Gen vsSB</th><th style="color:#38bdf8">Ah vsSB</th></tr></thead><tbody>`;
pos.forEach(p=>{stacks.forEach((s,i)=>{
h+=`<tr><td class="pos-td" style="color:${colors[p]}">${i===0?p:''}</td><td>${s}</td><td class="bet-td">${data.genBB[p][i]}%</td><td style="color:#f97316;font-weight:600">${data.ahBB[p][i]}%</td><td style="color:#a855f7;font-weight:600">${data.genSB[p][i]}%</td><td style="color:#38bdf8;font-weight:600">${data.ahSB[p][i]}%</td></tr>`;
});});
h+=`</tbody></table></section>`;

// Insights
h+=`<div class="ins-grid">
<div class="ins-card"><h4>🔑 Mayor diferencia: BTN A-high</h4><p>BTN c-betea <span class="hl">99.5%</span> vs BB en A-high pero solo <span class="hl-r">42%</span> vs SB a 40BB. Una diferencia de <span class="hl-r">57.5 puntos</span>. Es el spot donde más cambia la estrategia según el oponente.</p></div>
<div class="ins-card"><h4>📊 vs SB siempre menos c-bet</h4><p>En TODOS los spots, la frecuencia vs SB es menor que vs BB. Promedio de <span class="hl-r">~15% menos</span> en general y <span class="hl-r">~30% menos</span> en A-high boards.</p></div>
<div class="ins-card"><h4>🎯 A-high sube vs BB, no tanto vs SB</h4><p>Vs BB, A-high sube el c-bet en <span class="hl">+8 a +26 puntos</span>. Vs SB el efecto es menor: EP sube <span class="hl">+8</span> pero BTN sube apenas <span class="hl">+3</span> a 20BB y incluso <span class="hl-r">baja -8.5</span> a 40BB.</p></div>
<div class="ins-card"><h4>💡 Conclusión práctica</h4><p>El board texture importa MUCHO más vs BB que vs SB. Vs BB, A-high = c-bet casi siempre. Vs SB, incluso en A-high, hay que ser selectivo especialmente desde posiciones tardías.</p></div>
</div>`;

m.innerHTML=h;
</script></body></html>
